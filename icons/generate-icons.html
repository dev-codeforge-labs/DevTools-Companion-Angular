<!DOCTYPE html>
<!-- Run this file in a browser to generate icon-48.png and icon-96.png -->
<html>
<body>
<canvas id="c48" width="48" height="48"></canvas>
<canvas id="c96" width="96" height="96"></canvas>
<script>
  function drawIcon(canvas) {
    const ctx = canvas.getContext('2d');
    const s = canvas.width;
    // Background
    ctx.fillStyle = '#1A1A2E';
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.18);
    ctx.fill();
    // Angular triangle
    ctx.fillStyle = '#DD0031';
    const cx = s / 2, cy = s / 2;
    const r = s * 0.36;
    ctx.beginPath();
    ctx.moveTo(cx, cy - r);
    ctx.lineTo(cx + r * 0.87, cy + r * 0.5);
    ctx.lineTo(cx - r * 0.87, cy + r * 0.5);
    ctx.closePath();
    ctx.fill();
    // Inner cutout
    ctx.fillStyle = '#1A1A2E';
    const ri = r * 0.54;
    ctx.beginPath();
    ctx.moveTo(cx, cy - ri * 0.5);
    ctx.lineTo(cx + ri * 0.87, cy + ri * 0.5);
    ctx.lineTo(cx - ri * 0.87, cy + ri * 0.5);
    ctx.closePath();
    ctx.fill();
    return canvas.toDataURL('image/png');
  }

  const a48 = document.createElement('a');
  a48.href = drawIcon(document.getElementById('c48'));
  a48.download = 'icon-48.png';
  a48.textContent = 'Download icon-48.png';
  document.body.appendChild(a48);

  const a96 = document.createElement('a');
  a96.href = drawIcon(document.getElementById('c96'));
  a96.download = 'icon-96.png';
  a96.textContent = ' | Download icon-96.png';
  document.body.appendChild(a96);
</script>
</body>
</html>
